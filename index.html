<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%brand/logo-yuanmind.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="YuanMind 正在重塑 AI 时代的企业工作范式：让每个人拥有本地优先的猿工分身，让企业能力进入真实工作现场，而决策权始终留在人类手里。"
    />
    <meta name="theme-color" content="#F4F5F7" />
    <meta property="og:title" content="YuanMind · 本地优先桌面 AgentOS" />
    <meta
      property="og:description"
      content="用自然语言安排工作，让猿工分身调用本地文件、专家团队、企业知识库和业务系统完成复杂任务。"
    />
    <meta property="og:type" content="website" />
    <title>YuanMind · 本地优先桌面 AgentOS</title>
    <script>
      (() => {
        try {
          const savedTheme = window.localStorage.getItem('yuanmind-theme')
          const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches
          const theme = savedTheme === 'light' || savedTheme === 'dark'
            ? savedTheme
            : systemDark
              ? 'dark'
              : 'light'
          document.documentElement.dataset.theme = theme
        } catch {
          document.documentElement.dataset.theme = 'light'
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
